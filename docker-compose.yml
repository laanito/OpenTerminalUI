services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: openterminalui:latest
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      OPENTERMINALUI_ENV: "${OPENTERMINALUI_ENV:-development}"
      FMP_API_KEY: "${FMP_API_KEY:-}"
      FINNHUB_API_KEY: "${FINNHUB_API_KEY:-}"
      COINGECKO_API_KEY: "${COINGECKO_API_KEY:-}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-}"
      CACHE_SIGNING_KEY: "${CACHE_SIGNING_KEY:-}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://openterminalui:openterminalui@postgres:5432/openterminalui}"
      KITE_API_KEY: "${KITE_API_KEY:-}"
      KITE_API_SECRET: "${KITE_API_SECRET:-}"
      KITE_ACCESS_TOKEN: "${KITE_ACCESS_TOKEN:-}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
      OPENTERMINALUI_PREFETCH_ENABLED: "${OPENTERMINALUI_PREFETCH_ENABLED:-${OPENSCREENS_PREFETCH_ENABLED:-0}}"
      # Auto-populate the instrument search universe on first boot (set 0 to disable).
      OPENTERMINALUI_INSTRUMENT_AUTOSEED: "${OPENTERMINALUI_INSTRUMENT_AUTOSEED:-1}"
      # Hours between full universe refreshes (0 = seed-on-boot only).
      OPENTERMINALUI_INSTRUMENT_REFRESH_HOURS: "${OPENTERMINALUI_INSTRUMENT_REFRESH_HOURS:-24}"
      # Live Yahoo symbol-search fallback for the long tail (set 0 to disable).
      OPENTERMINALUI_INSTRUMENT_LIVE_SEARCH: "${OPENTERMINALUI_INSTRUMENT_LIVE_SEARCH:-1}"
      # Live crypto spot prices via Binance public WS (set 0 to disable).
      OPENTERMINALUI_BINANCE_WS_ENABLED: "${OPENTERMINALUI_BINANCE_WS_ENABLED:-true}"
      OPENTERMINALUI_SQLITE_URL: "${OPENTERMINALUI_SQLITE_URL:-${OPENSCREENS_SQLITE_URL:-sqlite:////data/openterminalui.db}}"
      OPENTERMINALUI_CORS_ORIGINS: "${OPENTERMINALUI_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}"
      # OpenAI-compatible LLM endpoint. Defaults to a local Ollama on the host;
      # override to use LM Studio, OpenAI, OpenRouter, etc. (LLM_API_KEY only for
      # hosted providers). Legacy LM_STUDIO_* vars are still honored by the backend.
      LLM_BASE_URL: "${LLM_BASE_URL:-http://host.docker.internal:11434/v1}"
      LLM_MODEL: "${LLM_MODEL:-llama3.1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_ENABLED: "${LLM_ENABLED:-true}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - openterminalui_data:/data
    develop:
      watch:
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./backend
        - action: rebuild
          path: ./frontend
        - action: rebuild
          path: ./config
        - action: rebuild
          path: ./data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    # pgvector/pgvector ships the official Postgres image + the pgvector
    # extension preinstalled. Pinned to pg16 so the existing data volume is reused
    # as-is (same major version → no dump/restore migration). The second-brain RAG
    # runs `CREATE EXTENSION vector` on startup; on plain postgres:16 that fails
    # and the index silently falls back to numpy cosine.
    image: pgvector/pgvector:0.8.3-pg16-trixie
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-openterminalui}"
      POSTGRES_USER: "${POSTGRES_USER:-openterminalui}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-openterminalui}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - openterminalui_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openterminalui} -d ${POSTGRES_DB:-openterminalui}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  openterminalui_data:
  openterminalui_postgres_data:
