name: CI

# Fast checks (backend pytest, frontend build + Vitest, mock-detection guard) gate
# every PR and every push to main. Playwright e2e is manual-only (workflow_dispatch)
# — see the gated steps below and docs/wiki/Roadmap.md → "e2e suite (parked)".
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Python compileall
        run: python -m compileall backend

      - name: Mock-detection guard (no fabricated data in production)
        run: python scripts/check_no_production_mocks.py

      - name: Run pytest with coverage
        run: PYTHONPATH=. pytest backend/tests -q --cov=backend --cov-fail-under=45 --cov-report=xml --junitxml=pytest-report.xml

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: |
            pytest-report.xml
            coverage.xml

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Frontend unit tests (Vitest)
        run: |
          cd frontend
          npx vitest run 2>&1 | tee vitest.log || true
          # Fail on actual test failures (✗ or FAIL markers)
          if grep -qE '^\s*[×✗]|FAIL\s' vitest.log; then
            echo "::error::Vitest tests had failures"
            exit 1
          fi
          # Ensure tests actually ran
          if ! grep -q '✓' vitest.log; then
            echo "::error::No passing tests found — vitest may not have run"
            exit 1
          fi
          echo "All Vitest tests passed"
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      # Playwright e2e is manual-only: `gh workflow run CI` or the Actions "Run
      # workflow" button. It is NOT on the per-commit/PR gate because the specs
      # currently assert data the v1.0 integrity work deliberately removed
      # (de-India defaults, synthetic order-book/quotes) and must be rewritten
      # before they can gate again. See docs/wiki/Roadmap.md → "e2e suite (parked)".
      - name: Install Playwright browsers
        if: github.event_name == 'workflow_dispatch'
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Playwright smoke tests
        if: github.event_name == 'workflow_dispatch'
        run: |
          npm run test:e2e --prefix frontend

      - name: Coverage PR comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const xml = fs.readFileSync('coverage.xml', 'utf8');
            const m = xml.match(/line-rate=\"([0-9.]+)\"/);
            const pct = m ? (Number(m[1]) * 100).toFixed(2) : 'unknown';
            const body = `Backend coverage: **${pct}%** (threshold: 45%)`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
