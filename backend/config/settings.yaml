app:
  name: "OpenTerminalUI API"
  environment: "local"
  default_exchange_suffix: ".NS"
  # OpenAI-compatible LLM endpoint for news sentiment, emotion & insights.
  # Defaults to a local Ollama server; works with LM Studio, OpenAI, OpenRouter,
  # etc. by overriding llm_base_url / llm_model / llm_api_key (env or here).
  llm_base_url: "http://localhost:11434/v1"
  llm_model: "llama3.1"
  llm_enabled: true
  llm_timeout_seconds: 240.0
  llm_structured_output: "auto"  # auto | json_schema | json | none

data_sources:
  market_data:
    provider: "yfinance"
    fallback_providers:
      - "alpha_vantage"
      - "polygon"
  macro_data:
    provider: "fred"

storage:
  raw_path: "data/raw"
  processed_path: "data/processed"
  cache_path: "data/cache"
